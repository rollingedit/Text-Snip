name: Windows CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301

      - name: Restore
        run: dotnet restore OcrSnip.slnx

      - name: Verify models
        shell: pwsh
        run: ./tools/verify-models.ps1

      - name: Build
        run: dotnet build OcrSnip.slnx -c Release --no-restore

      - name: Test
        run: dotnet test OcrSnip.slnx -c Release --no-build

      - name: Run OCR fixture gates
        shell: pwsh
        run: ./tools/run-ocr-fixtures.ps1

      - name: Verify validation tooling
        shell: pwsh
        run: ./tools/verify-validation-tooling.ps1

      - name: Publish
        shell: pwsh
        run: ./tools/publish.ps1

      - name: Create external validation kit
        shell: pwsh
        run: ./tools/create-external-validation-kit.ps1

      - name: Verify external validation kit
        shell: pwsh
        run: ./tools/verify-external-validation-kit.ps1 -RunLocalSelfTest

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: OcrSnip-Portable-x64
          path: artifacts/publish/OcrSnip-Portable-x64.zip

      - name: Upload external validation kit
        uses: actions/upload-artifact@v4
        with:
          name: OcrSnip-ExternalValidationKit
          path: artifacts/publish/OcrSnip-ExternalValidationKit.zip

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: artifacts/publish/SHA256SUMS.txt
